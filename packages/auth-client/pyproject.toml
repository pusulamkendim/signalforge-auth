[project]
name = "auth-client"
version = "0.1.0"
description = "Python client library for the SignalForge Auth Service"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.0,<1.0.0",
    "pydantic>=2.8.0,<3.0.0",
    "python-jose[cryptography]>=3.3.0,<4.0.0",
    "fastapi>=0.115.0,<1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/auth_client"]

[tool.uv]
package = true
