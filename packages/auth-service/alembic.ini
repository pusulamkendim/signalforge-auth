# Alembic configuration file
# sqlalchemy.url is intentionally empty — env.py reads it from AuthSettings.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os   # use os.pathsep (: on Linux/macOS, ; on Windows)

# Leave empty; set programmatically in alembic/env.py via AuthSettings.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
